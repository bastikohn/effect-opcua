name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "1"

jobs:
  verify:
    name: Verify release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run release checks
        run: pnpm check:release

  changesets:
    name: Version packages
    if: github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has-changesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Create or update version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          title: Version packages
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish packages
    if: github.ref == 'refs/heads/main' && needs.changesets.outputs.has-changesets == 'false'
    needs: [verify, changesets]
    runs-on: ubuntu-latest
    # The NPM_TOKEN lives in the `npm-publish` environment (scoped to `main`);
    # the job must opt into that environment for the secret to be available.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: pnpm build

      - name: Publish changed public packages
        run: pnpm changeset:publish
        env:
          # First publishes authenticate with an npm automation token; once the
          # packages exist we switch to token-free OIDC trusted publishing.
          # id-token: write already mints provenance attestations either way.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  back-merge:
    name: Back-merge main into dev
    # Runs only after a successful publish (needs: publish already implies the
    # `has-changesets == false` gate). Keeps `dev` in sync with the version and
    # CHANGELOG commits the changesets bot lands on `main` at release time, so
    # the next `dev -> main` PR diffs cleanly instead of drifting.
    if: github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout dev
        uses: actions/checkout@v7
        with:
          ref: dev
          fetch-depth: 0
          # Default GITHUB_TOKEN pushes do not re-trigger workflows, so this
          # cannot loop back into another Release run.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Fast-forwards when dev has not advanced; creates a merge commit
          # otherwise. A real conflict fails the job loudly for manual fixup.
          git merge --no-edit origin/main
          git push origin HEAD:dev
