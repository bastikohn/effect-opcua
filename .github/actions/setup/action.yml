name: Setup
description: Install Node, pnpm, and workspace dependencies

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "22.x"
  frozen-lockfile:
    description: Install dependencies with pnpm's frozen lockfile mode
    required: false
    default: "true"
  registry-url:
    description: Optional npm registry URL for publish jobs
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node
      if: ${{ inputs.registry-url == '' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Setup Node with npm registry
      if: ${{ inputs.registry-url != '' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install
        fi
